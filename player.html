<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Thả tim PRO</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#222;
  color:white;
}

button {
  font-size:50px;
  padding:30px;
  border-radius:20px;
  background:red;
  color:white;
  border:none;
}

#name {
  font-size:20px;
  margin:10px;
}
</style>
</head>

<body>

<h2>❤️ ĐUA NGỰA STEM</h2>

<div id="name"></div>

<button onclick="dropHeart()">❤️</button>

<audio id="sound" src="https://www.soundjay.com/animal/horse-neigh-01.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let playerId = localStorage.getItem("playerId");

if(!playerId){
  playerId = prompt("Nhập tên của bạn:");
  localStorage.setItem("playerId", playerId);
}

document.getElementById("name").innerText = "🐎 " + playerId;

// reset score
db.ref("players/" + playerId).set(0);

function dropHeart(){
  db.ref("players/" + playerId).transaction(v => (v||0)+1);

  let s = document.getElementById("sound");
  s.currentTime=0;
  s.play();
}
</script>

</body>
</html>
