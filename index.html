<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🏇 Đua ngựa STEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to top, #87CEEB, #fff);
}

h2 { margin: 10px; }

canvas {
  background: #fff;
  border: 3px solid black;
  border-radius: 15px;
}

#leaderboard {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<h2>🏇 CUỘC ĐUA NGỰA STEM</h2>
<canvas id="game" width="900" height="500"></canvas>

<div id="leaderboard"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
// 🔥 DÁN CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let players = {};
let finish = 800;

db.ref("players").on("value", snap=>{
  players = snap.val() || {};
});

function draw(){
  ctx.clearRect(0,0,900,500);

  let arr = Object.entries(players);
  arr.sort((a,b)=>b[1]-a[1]);

  // vẽ vạch đích
  ctx.fillStyle = "black";
  ctx.fillRect(finish,0,5,500);

  arr.forEach((p,index)=>{
    let name = p[0];
    let score = p[1];

    let x = 50 + score * 5;
    let y = 50 + index * 50;

    // highlight top 1
    if(index===0){
      ctx.fillStyle="gold";
      ctx.fillRect(0,y-20,900,40);
    }

    ctx.fillStyle="black";
    ctx.fillText("🐎", x, y);
    ctx.fillText(name, 10, y);
  });

  // bảng xếp hạng
  let html = "<b>🏆 TOP 3:</b><br>";
  arr.slice(0,3).forEach((p,i)=>{
    html += `${i+1}. ${p[0]} (${p[1]})<br>`;
  });
  document.getElementById("leaderboard").innerHTML = html;

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
